# inventory/hosts.ini
# Sau khi terraform apply, điền IP vào đây từ output:
#   terraform output app_server_public_ip
#   terraform output jenkins_server_public_ip

[app_servers]
app01 ansible_host=APP_SERVER_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/notemesh-keypair.pem

[jenkins_servers]
jenkins01 ansible_host=JENKINS_SERVER_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/notemesh-keypair.pem

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3
