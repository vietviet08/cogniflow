---
# roles/common/tasks/main.yml — Cài đặt chung cho mọi server

- name: Clean up conflicting Docker apt sources (before apt update)
  shell: |
    rm -f /etc/apt/sources.list.d/*docker*
    sed -i '/download.docker.com/d' /etc/apt/sources.list
  become: true
  changed_when: false

- name: Update apt cache
  apt:
      update_cache: true
      cache_valid_time: 3600
  become: true

- name: Install common packages
  apt:
      name:
          - curl
          - git
          - unzip
          - jq
          - htop
          - net-tools
          - python3-pip
      state: present
  become: true

- name: Check if AWS CLI v2 is installed
  command: aws --version
  register: aws_cli_check
  ignore_errors: true
  changed_when: false

- name: Install AWS CLI v2
  block:
      - name: Download AWS CLI v2 zip
        get_url:
            url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
            dest: /tmp/awscliv2.zip
            mode: "0644"

      - name: Unzip AWS CLI v2
        unarchive:
            src: /tmp/awscliv2.zip
            dest: /tmp
            remote_src: true

      - name: Run AWS CLI v2 installer
        command: /tmp/aws/install --update
  become: true
  when: aws_cli_check.rc != 0

- name: Set timezone to Asia/Ho_Chi_Minh
  timezone:
      name: Asia/Ho_Chi_Minh
  become: true

- name: Configure swap (2GB)
  block:
      - name: Check if swapfile exists
        stat:
            path: /swapfile
        register: swap_stat

      - name: Create swapfile
        command: fallocate -l 2G /swapfile
        when: not swap_stat.stat.exists

      - name: Set swapfile permissions
        file:
            path: /swapfile
            owner: root
            group: root
            mode: "0600"
        when: not swap_stat.stat.exists

      - name: Make swap
        command: mkswap /swapfile
        when: not swap_stat.stat.exists

      - name: Enable swap
        command: swapon /swapfile
        when: not swap_stat.stat.exists

      - name: Persist swap in fstab
        lineinfile:
            path: /etc/fstab
            line: "/swapfile none swap sw 0 0"
            state: present
        when: not swap_stat.stat.exists
  become: true

- name: Download NodeSource setup script
  get_url:
      url: https://deb.nodesource.com/setup_20.x
      dest: /tmp/nodesource_setup.sh
      mode: "0755"
  become: true

- name: Run NodeSource setup script
  command: /tmp/nodesource_setup.sh
  become: true
  changed_when: true

- name: Install Node.js and npm
  apt:
      name: nodejs
      state: present
      update_cache: true
  become: true

- name: Add Deadsnakes PPA repository
  apt_repository:
      repo: ppa:deadsnakes/ppa
      state: present
  become: true

- name: Install Python 3.12 and dependencies
  apt:
      name:
          - python3.12
          - python3.12-venv
          - python3.12-dev
      state: present
      update_cache: true
  become: true

- name: Ensure pip is installed for Python 3.12
  command: python3.12 -m ensurepip --upgrade
  become: true
  changed_when: true
