---
- name: Install Jenkins dependencies
  apt:
      name:
          - fontconfig
          - openjdk-21-jdk
      state: present
      update_cache: true
  become: true

- name: Remove legacy Java 17
  apt:
      name:
          - openjdk-17-jdk
          - openjdk-17-jre
          - openjdk-17-jre-headless
      state: absent
  become: true

- name: Add Jenkins apt signing key
  get_url:
      url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
      dest: /usr/share/keyrings/jenkins-keyring.asc
      owner: root
      group: root
      mode: "0644"
      force: true
  become: true

- name: Add Jenkins apt repository
  apt_repository:
      repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
      filename: jenkins
      state: present
  become: true

- name: Install Jenkins
  apt:
      name: jenkins
      state: present
      update_cache: true
  become: true

- name: Add Jenkins user to docker group
  user:
      name: jenkins
      groups: docker
      append: true
  become: true
  notify: restart jenkins

- name: Configure Jenkins JVM options
  lineinfile:
      path: /etc/default/jenkins
      regexp: "^JAVA_OPTS="
      line: 'JAVA_OPTS="-Djava.awt.headless=true -Xmx1024m -Xms512m"'
      state: present
  become: true
  notify: restart jenkins

- name: Enable and start Jenkins
  systemd:
      name: jenkins
      state: started
      enabled: true
  become: true

- name: Flush Jenkins handlers before health check
  meta: flush_handlers

- name: Wait for Jenkins to be fully started
  uri:
      url: "http://localhost:8080/login"
      status_code: 200
      timeout: 30
  retries: 15
  delay: 10
  register: jenkins_status
  until: jenkins_status.status == 200

- name: Get Jenkins initial admin password
  slurp:
      src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_initial_password
  become: true

- name: Display Jenkins initial admin password
  debug:
      msg: |
          ============================================================
          Jenkins Initial Admin Password:
          {{ jenkins_initial_password.content | b64decode }}

          Access Jenkins at: https://{{ jenkins_domain }}
          ============================================================

- name: Install Jenkins plugins via CLI
  community.general.jenkins_plugin:
      name: "{{ item }}"
      url: "http://localhost:8080"
      url_username: admin
      url_password: "{{ jenkins_initial_password.content | b64decode | trim }}"
      state: present
      timeout: 120
  loop:
      - git
      - github
      - workflow-aggregator
      - pipeline-stage-view
      - ssh-agent
      - aws-credentials
      - docker-workflow
      - docker-plugin
      - blueocean
      - slack
      - credentials-binding
  notify: restart jenkins
  become: true

- name: Create Jenkins SSH key for deploying to local app server
  file:
      path: /var/lib/jenkins/.ssh
      state: directory
      owner: jenkins
      group: jenkins
      mode: "0700"
  become: true

- name: Generate Jenkins SSH key for deploying to local app server
  openssh_keypair:
      path: /var/lib/jenkins/.ssh/deploy_key
      type: rsa
      size: 4096
      owner: jenkins
      group: jenkins
      mode: "0600"
  become: true

- name: Get Jenkins deploy public key
  slurp:
      src: /var/lib/jenkins/.ssh/deploy_key.pub
  register: jenkins_pubkey
  become: true

- name: Display Jenkins deploy public key
  debug:
      msg: |
          ============================================================
          Jenkins Deploy Public Key:
          {{ jenkins_pubkey.content | b64decode }}
          ============================================================
