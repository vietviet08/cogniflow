---
# roles/docker/tasks/main.yml — Cài Docker + Docker Compose

- name: Install Docker dependencies
  apt:
      name:
          - ca-certificates
          - gnupg
          - lsb-release
      state: present
  become: true

- name: Remove old Docker repository from sources.list
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*download.docker.com.*'
    state: absent
  become: true

- name: Remove old Docker repository list files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - "/etc/apt/sources.list.d/archive_uri-https_download_docker_com_linux_ubuntu-{{ ansible_distribution_release }}.list"
  become: true

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Add Docker GPG key (modern)
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Add Docker repository (modern)
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Install Docker Engine
  apt:
      name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
      state: present
      update_cache: true
  become: true

- name: Enable and start Docker
  systemd:
      name: docker
      state: started
      enabled: true
  become: true

- name: Add ubuntu user to docker group
  user:
      name: ubuntu
      groups: docker
      append: true
  become: true

- name: Install Docker Compose v2
  get_url:
      url: "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
      dest: /usr/local/bin/docker-compose
      mode: "0755"
  become: true

- name: Create Docker CLI plugin directory
  file:
      path: /usr/local/lib/docker/cli-plugins
      state: directory
      owner: root
      group: root
      mode: "0755"
  become: true

- name: Create docker compose symlink
  file:
      src: /usr/local/bin/docker-compose
      dest: /usr/local/lib/docker/cli-plugins/docker-compose
      state: link
      force: true
  become: true
