services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: notemesh-postgres
    environment:
      POSTGRES_DB: notemesh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - notemesh-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    container_name: notemesh-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: notemesh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - notemesh-minio-data:/data

volumes:
  notemesh-postgres-data:
  notemesh-minio-data:
